<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Badge Linker</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <h1>GitHub Badge Linker</h1>

    <div class="container">
        <div>
            <label for="githubUrl">GitHub profile URL:</label>
            <input type="text" id="githubUrl" placeholder="https://github.com/username">
        </div>

        <div>
            <label for="badgesInput">Paste badges (HTML <img> tags):</label>
            <textarea id="badgesInput" rows="8" placeholder='<img src="https://img.shields.io/badge/Vercel-3e80ed?style=for-the-badge&logo=vercel&logoColor=white" />'></textarea>
        </div>

        <button onclick="generateLinks()">Generate code</button>
        <div id="statusMessage" class="status"></div>

        <div>
            <label for="resultOutput">Generated code for README.md:</label>
            <textarea id="resultOutput" rows="12" readonly></textarea>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
