<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Badge Linker</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <main class="editorial-shell">
        <header class="masthead">
            <p class="section-label">Utility</p>
            <h1>GitHub Badge Linker</h1>
            <p class="dek">Convert raw badge image tags into repository-linked snippets with one pass.</p>
        </header>

        <section class="editorial-grid" aria-label="Badge linker form">
            <aside class="lead-column">
                <p class="section-label">Context</p>
                <blockquote class="pull-quote">Type is the interface. Structure is the style.</blockquote>
                <p class="support-copy">Enter your profile, paste badge tags, and export production-ready README markup in seconds.</p>
            </aside>

            <section class="form-column">
                <div class="field-block">
                    <label for="githubUrl" class="field-label">GitHub profile URL</label>
                    <input type="text" id="githubUrl" placeholder="https://github.com/username">
                </div>

                <div class="field-block">
                    <label for="badgesInput" class="field-label">Paste badge HTML (&lt;img&gt; tags)</label>
                    <textarea id="badgesInput" rows="8" placeholder='<img src="https://img.shields.io/badge/Vercel-3e80ed?style=for-the-badge&logo=vercel&logoColor=white" />'></textarea>
                </div>

                <button class="generate-btn" onclick="generateLinks()">Generate code</button>
                <div id="statusMessage" class="status"></div>

                <div class="field-block output-block">
                    <label for="resultOutput" class="field-label">Generated code for README.md</label>
                    <textarea id="resultOutput" rows="12" readonly></textarea>
                </div>
            </section>
        </section>
    </main>

    <script src="assets/js/app.js"></script>
</body>
</html>
